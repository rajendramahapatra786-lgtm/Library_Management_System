<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return Books - Library System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/return.css">
</head>

<body>
    <div class="container">
        <!-- Navigation -->
       <div id="navbar"></div>

        <!-- Main Content -->
        <main>
            <h1 class="page-title">📚 Return Books</h1>

            <!-- Search Section -->
            <section class="search-section">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="🔍 Search by book or member name...">
            </section>

            <!-- Message Area -->
            <div id="messageArea" class="message-area"></div>

            <!-- Books to Return Section -->
            <section class="books-section">
                <h2>📋 Books Ready to Return</h2>
                <div id="issuesList" class="issues-grid"></div>
            </section>

            <!-- Recently Returned Section -->
            <section class="returned-section">
                <h2>📜 Recently Returned</h2>
                <table class="returned-table">
                    <thead>
                        <tr>
                            <th>Book Name</th>
                            <th>Member Name</th>
                            <th>Return Date</th>
                            <th>Fine (₹)</th>
                        </tr>
                    </thead>
                    <tbody id="returnedTableBody"></tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- JavaScript Files -->
    <script src="js/issue.js"></script>
    <script src="js/return.js"></script>
    <script>
        fetch("components/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>
</body>

</html>
