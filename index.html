<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Home</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Navigation -->
    <div id="navbar"></div>

    <div class="container">
        <h1>Welcome to Library System</h1>

        <div class="cards">
            <div class="card">
                <h3>📊 Dashboard</h3>
                <p>View library statistics and recent activities</p>
                <a href="dashboard.html" class="btn">Go to Dashboard</a>
            </div>

            <div class="card">
                <h3>📚 Books</h3>
                <p>Manage your book collection</p>
                <a href="books.html" class="btn">Manage Books</a>
            </div>
        </div>

        <div class="info-box">
            <h3>Quick Guide</h3>
            <ul>
                <li>Click Dashboard to see statistics</li>
                <li>Click Books to add/view books</li>
                <li>All data is saved in your browser</li>
            </ul>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        fetch("components/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>
</body>

</html>
