<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Books - Library System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/issue.css">
</head>

<body>
    <div class="container">
       <div id="navbar"></div>

        <!-- Main Content -->
        <main>
            <h1 class="page-title">📕 Issue New Book</h1>

            <!-- Stats Section -->
            <div class="stats-container">
                <div class="stat-card">
                    <h3>Total Issued</h3>
                    <div class="stat-number" id="totalIssued">0</div>
                </div>
                <div class="stat-card">
                    <h3>Due Today</h3>
                    <div class="stat-number" id="dueToday">0</div>
                </div>
            </div>

            <!-- Issue Form -->
            <section class="issue-form">
                <h2>📝 Issue Book Form</h2>

                <div class="form-group">
                    <label for="bookName">Book Name:</label>
                    <input type="text" id="bookName" class="form-control" placeholder="Enter book name">
                </div>

                <div class="form-group">
                    <label for="memberName">Member Name:</label>
                    <input type="text" id="memberName" class="form-control" placeholder="Enter member name">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="days">Return in (days):</label>
                        <input type="number" id="days" class="form-control" value="7" min="1" max="30">
                    </div>
                </div>

                <div>
                    <button onclick="handleIssue()" class="btn btn-primary">📕 Issue Book</button>
                    <button onclick="clearForm()" class="btn btn-secondary">Clear Form</button>
                </div>
            </section>

            <!-- Message Area -->
            <div id="messageArea" class="message-area"></div>

            <!-- Search Section -->
            <section class="search-section">
                <input type="text" id="searchInput" class="search-input"
                    placeholder="🔍 Search issued books by name or member...">
            </section>

            <!-- Issues Table -->
            <section class="table-container">
                <table class="issues-table">
                    <thead>
                        <tr>
                            <th>Book Name</th>
                            <th>Member Name</th>
                            <th>Issue Date</th>
                            <th>Due Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="issuesTableBody">
                        <!-- Data will appear here -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="js/issue.js"></script>
    <script src="js/return.js"></script>
    <script>
        fetch("components/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;
            });
    </script>
    <script>
        // Page load
        document.addEventListener('DOMContentLoaded', function () {
            displayIssues();
            updateStats();

            // Search listener
            document.getElementById('searchInput').addEventListener('keyup', function (e) {
                filterIssues(e.target.value);
            });
        });

        // Handle issue button
        function handleIssue() {
            const book = document.getElementById('bookName').value;
            const member = document.getElementById('memberName').value;
            const days = parseInt(document.getElementById('days').value);

            if (!book || !member) {
                alert('Please fill all fields');
                return;
            }

            const result = issueBook(book, member, days);

            showMessage(`✅ Book "${book}" issued to ${member}`);
            clearForm();
            displayIssues();
            updateStats();
        }

        // Show message
        function showMessage(text) {
            const area = document.getElementById('messageArea');
            area.innerHTML = `<div class="message-success">${text}</div>`;

            setTimeout(() => {
                area.innerHTML = '';
            }, 3000);
        }

        // Clear form
        function clearForm() {
            document.getElementById('bookName').value = '';
            document.getElementById('memberName').value = '';
            document.getElementById('days').value = '7';
        }

        // Display issues
        function displayIssues(filtered = null) {
            const issues = filtered || getAllIssues().filter(i => i.status === 'issued');
            const tbody = document.getElementById('issuesTableBody');

            if (issues.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="no-data">No books issued</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            issues.forEach(issue => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${issue.book}</td>
                    <td>${issue.member}</td>
                    <td>${issue.issueDate}</td>
                    <td>${issue.dueDate}</td>
                    <td><span class="status-badge status-${issue.status}">${issue.status}</span></td>
                `;
                tbody.appendChild(row);
            });
        }

        // Filter issues
        function filterIssues(keyword) {
            keyword = keyword.toLowerCase().trim();

            if (keyword === '') {
                displayIssues();
                return;
            }

            const all = getAllIssues().filter(i => i.status === 'issued');
            const filtered = all.filter(issue =>
                issue.book.toLowerCase().includes(keyword) ||
                issue.member.toLowerCase().includes(keyword)
            );

            displayIssues(filtered);
        }

        // Update stats
        function updateStats() {
            const issues = getAllIssues().filter(i => i.status === 'issued');
            document.getElementById('totalIssued').textContent = issues.length;

            const today = new Date().toLocaleDateString();
            const dueToday = issues.filter(i => i.dueDate === today).length;
            document.getElementById('dueToday').textContent = dueToday;
        }
    </script>
</body>

</html>
